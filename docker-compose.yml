name: ai-picturebook

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-picturebook-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-please_change_mysql_password}@db:3306/${MYSQL_DATABASE:-ai_story}?charset=utf8mb4
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
    ports:
      - "${APP_PORT:-8001}:8001"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: ai-picturebook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-please_change_mysql_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_story}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-please_change_mysql_password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ai-picturebook-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
