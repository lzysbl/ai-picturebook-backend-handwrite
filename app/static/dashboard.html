<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作台 - AI 绘本故事生成系统</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge"></div>
        <div>
          <h1 class="brand-title">绘本故事工作台</h1>
          <p class="brand-sub">按流程完成：创建绘本 → 上传图片 → 生成故事</p>
        </div>
      </div>
      <div class="link-row">
        <span id="user-label" class="note">未登录</span>
        <button id="logout-btn" class="btn btn-soft" type="button">退出登录</button>
      </div>
    </header>

    <main class="dashboard-grid">
      <section class="card panel">
        <h2>绘本管理</h2>
        <form id="book-form" class="inline">
          <div class="field">
            <label class="field-label" for="book-title">绘本标题</label>
            <input id="book-title" class="input" type="text" required />
          </div>
          <button class="btn btn-primary" type="submit">创建绘本</button>
        </form>
        <div id="books-list" class="list"></div>
      </section>

      <section class="card panel">
        <h2>图片上传</h2>
        <form id="upload-form" class="form">
          <div class="field">
            <label class="field-label" for="book-select">选择绘本</label>
            <select id="book-select" class="select" required></select>
          </div>
          <div class="field">
            <label class="field-label" for="image-files">上传图片（可多选）</label>
            <input id="image-files" class="input" type="file" accept="image/*" multiple required />
          </div>
          <div class="field">
            <label class="field-label" for="start-order">起始页码</label>
            <input id="start-order" class="input" type="number" min="1" value="1" />
          </div>
          <button class="btn btn-primary" type="submit">上传图片</button>
        </form>
      </section>

      <section class="card panel">
        <h2>故事生成</h2>
        <form id="generate-form" class="form">
          <div class="field">
            <label class="field-label" for="prompt">额外提示词（可选）</label>
            <textarea id="prompt" class="textarea" placeholder="例如：用温柔语气，突出勇敢主题"></textarea>
          </div>
          <button class="btn btn-primary" type="submit">生成故事</button>
        </form>
        <pre id="generated-story" class="story-output"></pre>
      </section>

      <section class="card panel">
        <div class="toolbar">
          <h2>故事历史</h2>
          <button id="refresh-stories" class="btn btn-soft" type="button">刷新</button>
        </div>
        <div id="stories-list" class="list"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/static/ui-common.js"></script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
