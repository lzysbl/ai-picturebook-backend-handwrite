<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>故事生成 - AI 绘本故事生成系统</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge"></div>
        <div>
          <h1 class="brand-title">故事生成</h1>
          <p class="brand-sub">根据绘本图片一键生成故事并自动给出质量评价</p>
        </div>
      </div>
      <div class="link-row">
        <span id="user-label" class="note">未登录</span>
        <button id="logout-btn" class="btn btn-soft" type="button">退出登录</button>
      </div>
    </header>

    <nav class="workspace-nav card">
      <a data-nav="books" href="/ui/books">绘本管理</a>
      <a data-nav="upload" href="/ui/upload">图片上传</a>
      <a data-nav="generate" href="/ui/generate">故事生成</a>
      <a data-nav="history" href="/ui/history">故事历史</a>
    </nav>

    <main>
      <section class="card panel">
        <h2>生成故事</h2>
        <form id="generate-form" class="form">
          <div class="field">
            <label class="field-label" for="book-select">选择绘本</label>
            <select id="book-select" class="select" required></select>
            <div id="book-cover-preview" class="book-select-preview hidden">
              <img id="book-cover-preview-img" class="book-select-preview-img" alt="绘本封面" />
              <div id="book-cover-preview-text" class="book-select-preview-text"></div>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="prompt">额外提示词（可选）</label>
            <textarea id="prompt" class="textarea" placeholder="例如：语气更温柔，突出家庭主题"></textarea>
          </div>

          <div class="field inline-options">
            <label class="check-line">
              <input id="include-judge" type="checkbox" />
              生成后启用深度评估（LLM，耗时更长）
            </label>
            <label class="field-label" for="judge-samples">深度评估采样次数</label>
            <select id="judge-samples" class="select" disabled>
              <option value="1">1 次（推荐）</option>
              <option value="2">2 次</option>
              <option value="3">3 次</option>
              <option value="4">4 次</option>
              <option value="5">5 次</option>
            </select>
          </div>

          <button class="btn btn-primary" type="submit">生成故事</button>
        </form>

        <div id="task-progress" class="progress-wrap hidden">
          <div class="progress-meta">
            <span id="progress-text">等待执行</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>

        <div id="quality-panel" class="quality-panel hidden">
          <h3>本次评价结果</h3>
          <div id="quality-summary" class="quality-summary"></div>
          <pre id="quality-detail" class="quality-detail"></pre>
        </div>

        <pre id="generated-story" class="story-output"></pre>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/static/ui-common.js"></script>
  <script src="/static/workspace-common.js"></script>
  <script src="/static/generate.js"></script>
</body>
</html>
